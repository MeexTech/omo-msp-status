syntax = "proto3";

package omo.msp.status;
option go_package= "proto/status";

enum ActivityStatus {
    Draft   = 0; //草稿
    Check   = 1; // 审核中
    Pending = 2; // 审核通过，待发布或者释放
    Release = 3; // 释放成功；发送到b端，由b端clone一个相同内容的活动到c端
    Publish = 4; // 直接发送到c端
    Abandon = 5; // 活动废弃
    Ready     = 101; //准备中
    Being     = 102; //进行中
    Over      = 103; //已结束
}

enum ActivityType {
    Normal   = 0; //默认活动
    Template = 1; // 模板活动
    Open     = 2; //开放活动
    Recitation = 3; //诵读活动
    Reading  = 4; //阅读活动
    Place    = 5; //研学活动
    Custom   = 6; //自定义活动
}

enum ActivityAccess {
    Free = 0; //自由访问
    ChildHide = 1; //子场景不可见
    ChildMust = 2; //子场景可见且必做
}

enum ActivityScope {
    ToAll      = 0; //对所有人可见
    ToChildren = 1; //小孩
    ToUser     = 2; //C端用户
    ToStaff    = 3; //职工
}

enum ArticleType {
    Lesson   = 0; //课件
    Announce = 1; //校园公告
    News     = 2; //区新闻
    Resident = 3; //格桑码新闻
    ICH      = 4; //非遗新闻
}

enum MessageStatus {
    MsgDraft   = 0; //草稿
    MsgCheck   = 1; // 审核中
    MsgRefuse = 2; // 拒绝
    MsgAgree  = 3; // 同意
}

enum DisplayStatus {
    FDraft   = 0; //草稿
    FPending = 1; // 审核中，待发布或者释放
    FPublish = 2; // 发布成功
}

enum DisplayAccess {
    Read  = 0; //只读
    Close = 1; //关闭
    RW    = 2; //读写权限
    Write = 3; //写权限
}

enum ContentOption {
    Stay    = 0; //稳定
    Append   = 1; //追加内容
    Subtract = 2; //减去内容
}

enum NoticeScope {
    ToFamily = 0; //发送到小程序
    ToDevice = 1; //发送到设备
    ToWebsite = 2; //发送到网站
    ToResident = 3; //对格桑码居民
    ToRoute = 4; //对应
}

enum VersionStatus{
    VNone = 0;
    VAlpha = 1; //开发中
    VBeta = 2; //公测
    VStable = 3; //正式版本
}

enum GraphQuality{
    None     = 0;
    Low     = 1;
    Middle  = 2;
    High    = 3;
}

enum DependencyType{
    Module = 0;
    Plugin = 1;
}

enum WordsType{
    WTemplate = 0; //
    WBless = 1; //祝福
    WImage = 2; //图片留言
    WOther = 3; //图文留言
    WComment = 4; //评论
    WMessage = 5; //需求建议
}

enum OptionType{
    ODefault = 0; //无
    OAgree = 1; //同意
    ORefuse = 2; //拒绝
    OSwitch = 3; //切换关联
}

enum DisplayType{
    ShowAll = 0;
    ShowHeroStandard = 1; //标准大榜样展览
    ShowHero = 2; //自定义大榜样展览
    ShowExample = 3; //本地榜样展
    ShowActivity = 4; //活动展
    ShowQR = 5; //扫码展
    ShowAtlas = 6; //图片展览
    ShowProp = 7;  // 本地物品展
    ShowRecitation = 8;  // 朗诵
    ShowPlace  = 9;  //实践打卡
    ShowBooks  = 10; //阅读
    ShowHonor  = 11; //荣誉墙
    ShowAR = 12; //AR
}

enum AssetType{
    APerson = 0;
    AGroup = 1; //组织
    AWindowModel = 2; //windows 平台模型
    AAndroidModel = 3; //web 平台模型
    AAudio = 4;
    AVideo = 5;
    APortrait = 6; //系统头像
    AIcon = 7; //图标库
    ACertify = 8; //证书
}

enum AssetScope{
    Personal = 0;
    Org      = 1;
    System   = 2;
}

enum AssetStatus{
    APrivate = 0;
    APending = 1; //待审
    APublish = 2; //审核通过
    AVisible = 3; //可展示
}

enum FolderType{
    FDefault = 0; //无文件夹
    FRecitation = 1; //诵读文件夹
    FReading    = 2; //阅读文件夹
    FPlace = 3; //研学文件夹
    FDigital = 4; //数字文件夹
    FDIYCover   = 5; //自定义封面文件夹
    FLabel = 6; //标签文件夹
    FImage = 7; //图片文件夹
}

enum MaintainType {
    MReason = 0;
    MResult = 1;
    MSuggest = 2;
}

enum DeviceStatus{
    DIdle = 0;  //未绑定
    DBind = 1;  //已经绑定但未分配
    DFill = 2;  //已经绑定也分配了场景
    DAwake = 3;  //未激活
    DDiscard = 99; //废弃
}

enum SceneType {
    Other      = 0; // 未知
    School    = 1; // 学校
    Museum    = 2; // 博物馆
    Government = 3; // 政府部门
    Nursery   = 4; // 幼儿园
    Maker     = 5; //实践中心，创客
    Children  = 6; //少年宫
    Enterprise = 7; //企业
    Community = 8; //社区
}

enum ApplyStatus {
    SPending = 0;//待审核
    SPass = 1;//通过
    SRefused = 2;//被拒
    SNull = 5;//不存在
    SStay = 6;//搁置
}

enum ApplyType {
    ADefault = 0;
    AAdmin = 1;
}

enum MeetingStatus {
    MPending = 0;
    MIdle = 1;//已经开始
    MAutoStop = 2;//自动停止
    MClose = 3;//关闭
}

enum MeetingLocation {
    InRoom = 0;
    Outside = 1;
}

enum TaskStatus{
    TIdle = 0;
    TBusy = 1;
    TEnd = 2;
    TFroze = 99;
}